<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат-бот колл-центра</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .chat-container {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2563eb;
            color: #fff;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .chat-header .status {
            font-size: 12px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }
        .message.bot pre {
            background: #e5e7eb;
            padding: 8px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 6px;
        }
        .message.bot code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
        }
        .typing {
            display: flex;
            gap: 4px;
            padding: 14px 16px;
        }
        .typing span {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.30s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        .chat-input {
            display: flex;
            gap: 10px;
            padding: 14px 20px 18px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
        }
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input input:focus {
            border-color: #2563eb;
        }
        .chat-input button {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            background: #2563eb;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input button:hover {
            background: #1d4ed8;
        }
        .chat-input button:disabled {
            background: #93c5fd;
            cursor: default;
        }
        .actions {
            display: flex;
            gap: 8px;
            padding: 0 20px 10px;
            background: #fff;
        }
        .actions button {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            color: #4b5563;
            font-size: 12px;
            cursor: pointer;
        }
        .actions button:hover {
            background: #f9fafb;
        }
        .error {
            color: #dc2626;
            font-size: 13px;
            padding: 0 20px 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Чат-бот колл-центра (RAG)</h1>
            <div class="status"><span class="status-dot"></span> Онлайн</div>
        </div>
        <div class="chat-messages" id="messages"></div>
        <div class="actions">
            <button onclick="resetChat()">🔄 Новый диалог</button>
        </div>
        <div class="error" id="error"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Введите вопрос..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        // ─── НАСТРОЙКА API ───────────────────────────────────────────────────────
        // Локально: http://127.0.0.1:8000
        // После деплоя на Railway: замени на свой URL, например:
        // const API_BASE = "https://callcenter-bot-production.up.railway.app";
        const API_BASE = "https://callcenter-rag-bot-production.up.railway.app"; // при пустой строке — тот же домен (если фронт и бэк на одном домене)
        // Если фронт и бэк на разных доменах — укажи полный URL Railway здесь ↑

        const SESSION_ID = "web-" + Math.random().toString(36).slice(2, 10);
        const messagesEl = document.getElementById("messages");
        const inputEl = document.getElementById("userInput");
        const errorEl = document.getElementById("error");
        const sendBtn = document.getElementById("sendBtn");

        // Приветственное сообщение
        addBotMessage("Привет! Я — ассистент колл-центра. Задайте вопрос по базе знаний, и я найду ответ.");

        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        function addUserMessage(text) {
            const div = document.createElement("div");
            div.className = "message user";
            div.textContent = text;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(html) {
            const div = document.createElement("div");
            div.className = "message bot";
            div.innerHTML = html;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const div = document.createElement("div");
            div.className = "message bot typing";
            div.id = "typing";
            div.innerHTML = "<span></span><span></span><span></span>";
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function hideTyping() {
            const t = document.getElementById("typing");
            if (t) t.remove();
        }

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setError(msg) {
            errorEl.textContent = msg;
            setTimeout(() => errorEl.textContent = "", 5000);
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            errorEl.textContent = "";
            addUserMessage(text);
            inputEl.value = "";
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, session_id: SESSION_ID }),
                });
                hideTyping();
                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || `Ошибка сервера: ${res.status}`);
                }
                const data = await res.json();
                addBotMessage(escapeHtml(data.answer).replace(/\n/g, "<br>"));
            } catch (err) {
                hideTyping();
                setError(err.message || "Не удалось получить ответ");
            } finally {
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        async function resetChat() {
            messagesEl.innerHTML = "";
            addBotMessage("Диалог сброшен. Задайте новый вопрос.");
            try {
                await fetch(`${API_BASE}/reset?session_id=${SESSION_ID}`, { method: "POST" });
            } catch (e) {
                console.warn("reset error", e);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
